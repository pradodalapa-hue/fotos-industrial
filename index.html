<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDP INDUSTRIAL - SUPREME CLOUD</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #e2e8f0; font-family: 'Roboto', sans-serif; }
        .industrial-border { border: 2px solid #00f3ff; box-shadow: 0 0 20px rgba(0, 243, 255, 0.2); }
        .neon-text { color: #00f3ff; text-shadow: 0 0 10px rgba(0, 243, 255, 0.5); font-family: 'Orbitron', sans-serif; }
        .btn-jdp { background: linear-gradient(135deg, #001f3f 0%, #0074d9 100%); border: 1px solid #00f3ff; transition: all 0.3s ease; }
        .btn-jdp:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(0, 243, 255, 0.5); }
        .glass-panel { background: rgba(15, 15, 20, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(0, 243, 255, 0.1); }
        .history-card { background: #0a0a0a; border-left: 4px solid #00f3ff; transition: 0.3s; }
        .history-card:hover { background: #111; }
        input { background: #000 !important; border: 1px solid #333 !important; color: #00f3ff !important; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #00f3ff; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-5xl mb-8 text-center mt-6">
        <h1 class="neon-text text-3xl md:text-5xl font-bold mb-2 italic">JDP INDUSTRIAL</h1>
        <p class="text-gray-500 tracking-[0.5em] uppercase text-[10px]">Sistema de Custódia de Imagens v13.5</p>
    </header>

    <div class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 gap-8">
        
        <!-- COLUNA ESQUERDA: UPLOAD -->
        <section class="glass-panel p-6 rounded-xl industrial-border h-fit">
            <h2 class="text-cyan-500 font-bold mb-4 flex items-center gap-2">
                <span class="w-2 h-2 bg-cyan-500 animate-pulse"></span> TERMINAL DE UPLOAD
            </h2>
            
            <div class="space-y-4 mb-6">
                <input type="password" id="token"VALOR_PROTEGIDO_POR_JOSE_DIVINO_PRADO_DA_LAPA" placeholder="GitHub Token" class="w-full p-2 rounded text-xs outline-none">
                <input type="text" id="repo" value="pradodalapa-hue/fotos-industrial" placeholder="Usuario/Repositorio" class="w-full p-2 rounded text-xs outline-none">
            </div>

            <div id="drop-zone" class="border-2 border-dashed border-cyan-900 rounded-lg p-8 text-center hover:border-cyan-400 transition-all cursor-pointer bg-black/50">
                <input type="file" id="fileInput" class="hidden" accept="image/*">
                <div id="upload-prompt">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-cyan-600 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <p class="text-xs text-gray-400 uppercase">Arraste ou Clique</p>
                </div>
                <img id="preview" class="hidden max-h-48 mx-auto rounded border border-cyan-500/30">
            </div>

            <button id="uploadBtn" class="btn-jdp w-full mt-4 py-3 rounded font-bold uppercase tracking-widest text-white hidden">Iniciar Transmissão</button>
            
            <div id="loader" class="hidden mt-4 text-center animate-pulse text-cyan-500 text-xs font-bold">
                ENVIANDO DADOS PARA O KERNEL...
            </div>
        </section>

        <!-- COLUNA DIREITA: HISTÓRICO -->
        <section class="glass-panel p-6 rounded-xl border border-gray-800 flex flex-col h-[600px]">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-cyan-500 font-bold flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500"></span> REGISTRO DE MANIFESTO
                </h2>
                <button onclick="clearHistory()" class="text-[10px] text-red-500 hover:underline uppercase">Limpar Tudo</button>
            </div>
            
            <div id="historyList" class="overflow-y-auto flex-1 space-y-3 pr-2">
                <!-- Itens do histórico aparecerão aqui -->
            </div>
        </section>
    </div>

    <footer class="mt-10 text-gray-600 text-[10px] tracking-widest uppercase">
        Propriedade de José Divino Prado da Lapa | Helena v13.5 | PWA Ativo
    </footer>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('drop-zone');
        const preview = document.getElementById('preview');
        const uploadBtn = document.getElementById('uploadBtn');
        const historyList = document.getElementById('historyList');
        const loader = document.getElementById('loader');

        // Inicializar Histórico
        document.addEventListener('DOMContentLoaded', loadHistory);

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    preview.src = ev.target.result;
                    preview.classList.remove('hidden');
                    document.getElementById('upload-prompt').classList.add('hidden');
                    uploadBtn.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        uploadBtn.onclick = async () => {
            const token = document.getElementById('token').value.trim();
            const repo = document.getElementById('repo').value.trim();
            const file = fileInput.files[0];

            uploadBtn.classList.add('hidden');
            loader.classList.remove('hidden');

            const fileName = `JDP_${Date.now()}_${file.name.replace(/\s/g, '_')}`;
            const reader = new FileReader();
            
            reader.onload = async () => {
                const base64Content = reader.result.split(',')[1];
                const url = `https://api.github.com/repos/${repo}/contents/img/${fileName}`;

                try {
                    const response = await fetch(url, {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: `Upload: ${fileName}`, content: base64Content, branch: "main" })
                    });

                    if (response.ok) {
                        const rawUrl = `https://raw.githubusercontent.com/${repo}/main/img/${fileName}`;
                        saveToHistory(rawUrl, fileName);
                        alert("UPLOAD CONCLUÍDO COM SUCESSO!");
                        resetUpload();
                    } else { alert("ERRO NA CONEXÃO."); }
                } catch (e) { alert("FALHA CRÍTICA."); }
                loader.classList.add('hidden');
            };
            reader.readAsDataURL(file); // Mantém qualidade original
        };

        function saveToHistory(url, name) {
            let history = JSON.parse(localStorage.getItem('jdp_history') || '[]');
            history.unshift({ url, name, date: new Date().toLocaleString() });
            localStorage.setItem('jdp_history', JSON.stringify(history));
            loadHistory();
        }

        function loadHistory() {
            let history = JSON.parse(localStorage.getItem('jdp_history') || '[]');
            historyList.innerHTML = history.map((item, index) => `
                <div class="history-card p-3 rounded">
                    <div class="flex gap-3 items-center">
                        <img src="${item.url}" class="w-12 h-12 object-cover rounded border border-cyan-900">
                        <div class="flex-1 overflow-hidden">
                            <p class="text-[10px] text-cyan-400 truncate font-mono">${item.name}</p>
                            <p class="text-[8px] text-gray-600">${item.date}</p>
                        </div>
                        <button onclick="copy('${item.url}')" class="bg-cyan-900 p-2 rounded text-[10px] hover:bg-cyan-700 transition">COPIAR</button>
                    </div>
                </div>
            `).join('');
        }

        function copy(text) {
            navigator.clipboard.writeText(text);
            alert("LINK COPIADO!");
        }

        function clearHistory() {
            if(confirm("Deseja apagar o registro local, Sr. José?")) {
                localStorage.removeItem('jdp_history');
                loadHistory();
            }
        }

        function resetUpload() {
            preview.classList.add('hidden');
            document.getElementById('upload-prompt').classList.remove('hidden');
            uploadBtn.classList.add('hidden');
            fileInput.value = "";
        }

        // Registro do Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
</html>
